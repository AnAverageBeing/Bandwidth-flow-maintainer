name: CI — Test, Build, Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: go test -v -count=1 -timeout 60s ./...

  # ── Build All Architectures ──────────────────────────────────────────────
  build:
    needs: lint-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, arm]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o bandwidth-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/bandwidth/
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o bandwidthd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/bandwidthd/

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bandwidth-${{ matrix.goos }}-${{ matrix.goarch }}
            bandwidthd-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: 'binaries-*', merge-multiple: true }

      - name: Package & Checksum
        run: |
          for f in bandwidth-* bandwidthd-*; do
            gzip -9 "$f"
          done
          sha256sum *.gz > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Bandwidth Manager ${{ github.ref_name }}

            ### Quick Install
            ```bash
            curl -sSL https://raw.githubusercontent.com/AnAverageBeing/Bandwidth-flow-maintainer/main/install.sh | sudo bash
            ```

            ### Direct Download
            ```bash
            # amd64
            curl -sSL https://github.com/AnAverageBeing/Bandwidth-flow-maintainer/releases/download/${{ github.ref_name }}/bandwidth-linux-amd64.gz | gunzip > /usr/local/bin/bandwidth
            curl -sSL https://github.com/AnAverageBeing/Bandwidth-flow-maintainer/releases/download/${{ github.ref_name }}/bandwidthd-linux-amd64.gz | gunzip > /usr/local/bin/bandwidthd
            chmod +x /usr/local/bin/bandwidth /usr/local/bin/bandwidthd
            ```
          files: |
            bandwidth-linux-amd64.gz
            bandwidthd-linux-amd64.gz
            bandwidth-linux-arm64.gz
            bandwidthd-linux-arm64.gz
            bandwidth-linux-arm.gz
            bandwidthd-linux-arm.gz
            checksums.txt
          token: ${{ secrets.GITHUB_TOKEN }}
